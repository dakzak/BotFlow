<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotFlow — Vue d'ensemble</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/common.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-900" x-data="dashboardPage()" x-init="init()">

  <header class="bg-slate-950 text-white">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/dashboard.html" class="text-xl font-bold">🤖 Bot<span class="text-emerald-400">Flow</span></a>
      <div class="flex items-center gap-4 text-sm">
        <span class="text-slate-300" x-text="org ? org.name + ' · ' + org.plan : ''"></span>
        <button @click="logout()" class="border border-slate-700 hover:border-slate-500 rounded-lg px-3 py-1.5">Déconnexion</button>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-12 gap-6">

    <!-- Barre latérale : agents -->
    <aside class="col-span-12 md:col-span-3">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-bold">Mes agents</h2>
          <span class="text-xs text-slate-500" x-text="org ? agents.length + '/' + org.max_agents : ''"></span>
        </div>
        <template x-for="agent in agents" :key="agent.id">
          <button @click="selectAgent(agent)"
            class="w-full text-left rounded-lg px-3 py-2.5 mb-1 border"
            :class="current && current.id === agent.id ? 'bg-emerald-50 border-emerald-400' : 'border-transparent hover:bg-slate-50'">
            <div class="font-medium" x-text="agent.name"></div>
            <div class="text-xs flex items-center gap-1.5 mt-0.5">
              <span class="inline-block w-2 h-2 rounded-full"
                :class="agent.whatsapp_status === 'connected' ? 'bg-emerald-500' : 'bg-slate-300'"></span>
              <span class="text-slate-500" x-text="agent.whatsapp_status === 'connected' ? 'WhatsApp connecté' : 'Déconnecté'"></span>
            </div>
          </button>
        </template>
        <a href="/agent-nouveau.html" class="block text-center w-full mt-3 bg-slate-950 hover:bg-slate-800 text-white rounded-lg py-2.5 font-medium">+ Nouvel agent</a>
      </div>
    </aside>

    <!-- Contenu -->
    <main class="col-span-12 md:col-span-9">
      <nav class="flex gap-1 mb-4 bg-white rounded-xl shadow-sm border border-slate-200 p-1.5">
        <template x-for="t in tabs" :key="t.id">
          <a :href="t.href" class="flex-1 text-center rounded-lg py-2 text-sm font-medium"
            :class="page === t.id ? 'bg-slate-950 text-white' : 'text-slate-600 hover:bg-slate-100'"
            x-text="t.label"></a>
        </template>
      </nav>

      <template x-if="error">
        <div class="bg-red-50 border border-red-300 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm" x-text="error"></div>
      </template>

      <template x-if="!current">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-12 text-center text-slate-500">
          <div class="text-5xl mb-4">🤖</div>
          <p class="font-medium text-slate-700 mb-1">Aucun agent pour le moment</p>
          <p class="text-sm mb-4">Créez votre premier agent : l'assistant vous guide en 5 étapes.</p>
          <a href="/agent-nouveau.html" class="inline-block bg-emerald-500 hover:bg-emerald-400 text-white rounded-lg px-5 py-2.5 font-medium">Créer un agent</a>
        </div>
      </template>

      <template x-if="current">
        <div class="space-y-4">
          <!-- État du canal -->
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center justify-between">
            <div>
              <h3 class="font-bold mb-1">Canal WhatsApp</h3>
              <div class="flex items-center gap-2 text-sm">
                <span class="inline-block w-2.5 h-2.5 rounded-full"
                  :class="channel.status === 'connected' ? 'bg-emerald-500' : (channel.status === 'disconnected' ? 'bg-red-400' : 'bg-amber-400')"></span>
                <span x-text="statusLabel(channel.status)"></span>
              </div>
            </div>
            <div class="flex gap-2">
              <button x-show="channel.status !== 'connected'" @click="connectChannel()" class="bg-emerald-500 hover:bg-emerald-400 text-white rounded-lg px-4 py-2 text-sm font-medium">Connecter</button>
              <button x-show="channel.status === 'connected'" @click="disconnectChannel()" class="border border-slate-300 hover:bg-slate-50 rounded-lg px-4 py-2 text-sm">Déconnecter</button>
            </div>
          </div>

          <!-- QR code -->
          <div x-show="channel.qr && channel.status !== 'connected'" class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 text-center">
            <p class="text-sm text-slate-600 mb-3">Scannez ce QR code avec WhatsApp (Appareils connectés → Connecter un appareil) :</p>
            <img :src="channel.qr" class="mx-auto w-56 h-56" alt="QR code WhatsApp" />
          </div>

          <!-- Statistiques -->
          <div class="grid grid-cols-3 gap-4">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
              <div class="text-2xl font-bold" x-text="overview ? overview.conversationsToday : '—'"></div>
              <div class="text-sm text-slate-500">Conversations aujourd'hui</div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
              <div class="text-2xl font-bold" x-text="overview ? overview.transactionsCount : '—'"></div>
              <div class="text-sm text-slate-500">Transactions</div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
              <div class="text-2xl font-bold" x-text="overview ? overview.activeCustomers : '—'"></div>
              <div class="text-sm text-slate-500">Clients actifs (7 j)</div>
            </div>
          </div>

          <!-- Conversations récentes -->
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
            <h3 class="font-bold mb-3">Conversations récentes</h3>
            <template x-if="overview && !overview.recentConversations.length">
              <p class="text-sm text-slate-500">Aucune conversation pour le moment.</p>
            </template>
            <template x-for="c in (overview ? overview.recentConversations : [])" :key="c.id">
              <div class="border-t border-slate-100 py-2.5 flex items-center justify-between gap-4">
                <div class="min-w-0">
                  <div class="font-medium text-sm" x-text="c.customer_name || c.customer_id"></div>
                  <div class="text-sm text-slate-500 truncate" x-text="c.lastMessage"></div>
                </div>
                <div class="text-xs text-slate-400 whitespace-nowrap" x-text="formatDate(c.last_message_at)"></div>
              </div>
            </template>
          </div>
        </div>
      </template>
    </main>
  </div>

  <script>
    function dashboardPage() {
      return {
        ...baseApp('dashboard'),
        overview: null,
        channel: { status: 'disconnected', qr: null },
        pollTimer: null,

        async init() {
          if (await this.initBase()) this.onAgentChange();
        },

        onAgentChange() {
          this.overview = null;
          this.channel = { status: 'disconnected', qr: null };
          this.loadOverview();
          this.startPolling();
        },

        async loadOverview() {
          if (!this.current) return;
          try { this.overview = await this.api('/agents/' + this.current.id + '/overview'); }
          catch (err) { this.error = err.message; }
        },

        async refreshChannel() {
          if (!this.current) return;
          try {
            this.channel = await this.api('/agents/' + this.current.id + '/channel/status');
            this.current.whatsapp_status = this.channel.status === 'connected' ? 'connected' : 'disconnected';
          } catch { /* statut indisponible, on retentera */ }
        },

        startPolling() {
          if (this.pollTimer) clearInterval(this.pollTimer);
          this.refreshChannel();
          this.pollTimer = setInterval(() => this.refreshChannel(), 3000);
        },

        async connectChannel() {
          try {
            await this.api('/agents/' + this.current.id + '/channel/connect', { method: 'POST', body: {} });
            this.startPolling();
          } catch (err) { this.error = err.message; }
        },

        async disconnectChannel() {
          try {
            await this.api('/agents/' + this.current.id + '/channel/disconnect', { method: 'POST', body: { clearSession: true } });
            this.channel = { status: 'disconnected', qr: null };
          } catch (err) { this.error = err.message; }
        },
      };
    }
  </script>
</body>
</html>
